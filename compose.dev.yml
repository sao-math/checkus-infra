# When adding/removing environment variables here, also update the export lines in:
#   checkus-server/.github/workflows/cicd-dev.yml
#   checkus-server/.github/workflows/deploy-only.yml (if applicable)
services:
  checkus-server-dev:
    image: 855673866113.dkr.ecr.ap-northeast-2.amazonaws.com/checkus/server:dev
    ports:
      - 8083:8080
    restart: unless-stopped
    container_name: checkus-server-dev
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - RDS_ENDPOINT=${RDS_ENDPOINT}
      - RDS_USERNAME=${RDS_USERNAME}
      - RDS_PASSWORD=${RDS_PASSWORD}
      - RDS_DATABASE=${DEV_RDS_DATABASE:-checkus_dev}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_NOTIFICATION_CHANNEL_ID=${DISCORD_NOTIFICATION_CHANNEL_ID}
      - ADMIN_NAME=관리자
      - JWT_ACCESS_EXPIRATION=3600000
      - JWT_REFRESH_EXPIRATION=604800000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - JWT_SECRET=${JWT_SECRET}
      - BIZGO_CLIENT_ID=${BIZGO_CLIENT_ID}
      - BIZGO_CLIENT_PASSWORD=${BIZGO_CLIENT_PASSWORD}
      - BIZGO_SENDER_KEY=${BIZGO_SENDER_KEY}
      - AWS_S3_ACCESS_KEY=${AWS_S3_ACCESS_KEY}
      - AWS_S3_SECRET_KEY=${AWS_S3_SECRET_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_S3_REGION=${AWS_S3_REGION}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_ADMIN_API_KEY=${OPENAI_ADMIN_API_KEY}
      - AI_CONSULTATION_ENABLED=${AI_CONSULTATION_ENABLED:-false}
      - TIRO_API_KEY=${TIRO_API_KEY}
      - TIRO_API_ENABLED=${TIRO_API_ENABLED:-false}
      - ENCRYPTION_SECRET_KEY=${ENCRYPTION_SECRET_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - NAVER_RESERVATION_FALLBACK_SLACK_WEBHOOK_URL=${NAVER_RESERVATION_FALLBACK_SLACK_WEBHOOK_URL:-}
      - NAVER_RESERVATION_EXPECTED_SNS_TOPIC_ARN=${NAVER_RESERVATION_EXPECTED_SNS_TOPIC_ARN:-}
      - PROMETHEUS_SCRAPE_USERNAME=${PROMETHEUS_SCRAPE_USERNAME:-prometheus}
      - PROMETHEUS_SCRAPE_PASSWORD=${PROMETHEUS_SCRAPE_PASSWORD:-}
      - EXTERNAL_SIDE_EFFECTS_ENABLED=false
      - EXTERNAL_SIDE_EFFECTS_ALLOWED_TYPES=
      - OPS_DEV_SNAPSHOT_ENABLED=${OPS_DEV_SNAPSHOT_ENABLED:-false}
      - OPS_DEV_SNAPSHOT_SCRIPT_PATH=${OPS_DEV_SNAPSHOT_SCRIPT_PATH:-}
      - OPS_DEV_SNAPSHOT_WORKING_DIRECTORY=${OPS_DEV_SNAPSHOT_WORKING_DIRECTORY:-}
      - OPS_DEV_SNAPSHOT_OUTPUT_DIRECTORY=${OPS_DEV_SNAPSHOT_OUTPUT_DIRECTORY:-/app/data/dev-snapshot-runs}
      - OPS_DEV_SNAPSHOT_TIMEOUT_SECONDS=${OPS_DEV_SNAPSHOT_TIMEOUT_SECONDS:-3600}
      - OPS_DEV_SNAPSHOT_CONFIRMATION_PHRASE=${OPS_DEV_SNAPSHOT_CONFIRMATION_PHRASE:-REFRESH DEV FROM PROD}
      - JAVA_OPTS=-Xmx350m -Xms150m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication -XX:G1HeapRegionSize=1M
    volumes:
      - /home/ubuntu/checkus-data-dev:/app/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Grafana Alloy: dev HikariCP/JVM 메트릭 scrape → Grafana Cloud Prometheus (F545)
  # `profiles: [monitoring]` 로 opt-in. Phase B 완료 후 활성화.
  alloy-dev:
    image: grafana/alloy:v1.4.0
    container_name: alloy-dev
    profiles: [monitoring]
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12346
      - --stability.level=generally-available
    volumes:
      - ./alloy/dev.alloy:/etc/alloy/config.alloy:ro
    environment:
      - PROMETHEUS_SCRAPE_USERNAME=${PROMETHEUS_SCRAPE_USERNAME:-prometheus}
      - PROMETHEUS_SCRAPE_PASSWORD=${PROMETHEUS_SCRAPE_PASSWORD:-}
      - GRAFANA_CLOUD_PROM_URL=${GRAFANA_CLOUD_PROM_URL:-}
      - GRAFANA_CLOUD_PROM_USERNAME=${GRAFANA_CLOUD_PROM_USERNAME:-}
      - GRAFANA_CLOUD_PROM_API_KEY=${GRAFANA_CLOUD_PROM_API_KEY:-}
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
