# When adding/removing environment variables here, also update the export lines in:
#   checkus-server/.github/workflows/cicd.yml
#   checkus-server/.github/workflows/deploy-only.yml
#
# Blue-green deployment: nginx routes to active container (blue or green).
# Only one of blue/green runs at a time. deploy.sh handles switching.

x-server-env: &server-env
  - SPRING_PROFILES_ACTIVE=prod
  - RDS_ENDPOINT=${RDS_ENDPOINT}
  - RDS_USERNAME=${RDS_USERNAME}
  - RDS_PASSWORD=${RDS_PASSWORD}
  - RDS_DATABASE=${RDS_DATABASE}
  - DISCORD_TOKEN=${DISCORD_TOKEN}
  - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
  - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
  - DISCORD_NOTIFICATION_CHANNEL_ID=${DISCORD_NOTIFICATION_CHANNEL_ID}
  - ADMIN_NAME=관리자
  - JWT_ACCESS_EXPIRATION=3600000
  - JWT_REFRESH_EXPIRATION=604800000
  - ADMIN_PASSWORD=${ADMIN_PASSWORD}
  - ADMIN_USERNAME=${ADMIN_USERNAME}
  - JWT_SECRET=${JWT_SECRET}
  - BIZGO_CLIENT_ID=${BIZGO_CLIENT_ID}
  - BIZGO_CLIENT_PASSWORD=${BIZGO_CLIENT_PASSWORD}
  - BIZGO_SENDER_KEY=${BIZGO_SENDER_KEY}
  - AWS_S3_ACCESS_KEY=${AWS_S3_ACCESS_KEY}
  - AWS_S3_SECRET_KEY=${AWS_S3_SECRET_KEY}
  - AWS_S3_BUCKET=${AWS_S3_BUCKET}
  - AWS_S3_REGION=${AWS_S3_REGION}
  - OPENAI_API_KEY=${OPENAI_API_KEY}
  - OPENAI_ADMIN_API_KEY=${OPENAI_ADMIN_API_KEY}
  - AI_CONSULTATION_ENABLED=${AI_CONSULTATION_ENABLED:-false}
  - TIRO_API_KEY=${TIRO_API_KEY}
  - TIRO_API_ENABLED=${TIRO_API_ENABLED:-false}
  - ENCRYPTION_SECRET_KEY=${ENCRYPTION_SECRET_KEY}
  - SENTRY_DSN=${SENTRY_DSN}
  - NAVER_RESERVATION_FALLBACK_SLACK_WEBHOOK_URL=${NAVER_RESERVATION_FALLBACK_SLACK_WEBHOOK_URL:-}
  - NAVER_RESERVATION_EXPECTED_SNS_TOPIC_ARN=${NAVER_RESERVATION_EXPECTED_SNS_TOPIC_ARN:-}
  - PAYMINT_ENABLED=${PAYMINT_ENABLED:-false}
  - PAYMINT_API_KEY=${PAYMINT_API_KEY}
  - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
  - PROMETHEUS_SCRAPE_USERNAME=${PROMETHEUS_SCRAPE_USERNAME:-prometheus}
  - PROMETHEUS_SCRAPE_PASSWORD=${PROMETHEUS_SCRAPE_PASSWORD:-}
  # F587 (2026-05-15): pool 20 → 30 defense-in-depth. RDS max_connections 여유 확인됨.
  - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-30}
  # F587 (2026-05-15): GC 로그 활성화. 다음 incident 진단을 위해 Full GC stop-the-world 직접 캡처.
  # /app/data 는 호스트 /home/ubuntu/checkus-data 와 mount, 컨테이너 재시작에도 보존.
  - JAVA_OPTS=-Xmx2048m -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication -XX:G1HeapRegionSize=1M -Xlog:gc*:file=/app/data/gc.log:time,level,tags:filecount=5,filesize=10M

x-server-logging: &server-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/active.conf:/etc/nginx/conf.d/active.conf:ro
      - ./nginx/blocked-endpoints.conf:/etc/nginx/conf.d/blocked-endpoints.conf
    restart: unless-stopped
    networks:
      - checkus-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  checkus-blue:
    image: 855673866113.dkr.ecr.ap-northeast-2.amazonaws.com/checkus/server
    ports:
      - "8081:8080"
    restart: unless-stopped
    container_name: checkus-blue
    stop_grace_period: 45s
    networks:
      - checkus-net
    environment: *server-env
    volumes:
      - /home/ubuntu/checkus-data:/app/data
    logging: *server-logging

  checkus-green:
    image: 855673866113.dkr.ecr.ap-northeast-2.amazonaws.com/checkus/server
    ports:
      - "8082:8080"
    restart: unless-stopped
    container_name: checkus-green
    stop_grace_period: 45s
    networks:
      - checkus-net
    environment: *server-env
    volumes:
      - /home/ubuntu/checkus-data:/app/data
    logging: *server-logging

  # Grafana Alloy: HikariCP/JVM 메트릭 scrape → Grafana Cloud Prometheus remote_write (F545)
  # `profiles: [monitoring]` 로 opt-in. Phase B(Grafana Cloud 가입) 완료 후
  # `COMPOSE_PROFILES=monitoring` 환경변수로 활성화.
  alloy:
    image: grafana/alloy:v1.4.0
    container_name: alloy
    profiles: [monitoring]
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=generally-available
    volumes:
      - ./alloy/prod.alloy:/etc/alloy/config.alloy:ro
    environment:
      - PROMETHEUS_SCRAPE_USERNAME=${PROMETHEUS_SCRAPE_USERNAME:-prometheus}
      - PROMETHEUS_SCRAPE_PASSWORD=${PROMETHEUS_SCRAPE_PASSWORD:-}
      - GRAFANA_CLOUD_PROM_URL=${GRAFANA_CLOUD_PROM_URL:-}
      - GRAFANA_CLOUD_PROM_USERNAME=${GRAFANA_CLOUD_PROM_USERNAME:-}
      - GRAFANA_CLOUD_PROM_API_KEY=${GRAFANA_CLOUD_PROM_API_KEY:-}
    networks:
      - checkus-net
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  checkus-net:
    driver: bridge
